name: ci

# Unit tests for the trust boundary (loadConfig + verifyOIDC + deriveEdit + policyFor). No
# network, no secrets — the verifier's JWKS/clock seams are mocked; tests mint their own keypair.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: node --test src/index.test.mjs
